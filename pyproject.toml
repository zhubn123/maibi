[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "maibi"
version = "0.1.0"
description = "Windows desktop Chinese voice input tool."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
server = [
    "fastapi>=0.115",
    "uvicorn>=0.32",
]
dev = [
    "fastapi>=0.115",
    "httpx>=0.27",
    "pytest>=8.0",
    "uvicorn>=0.32",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["client*", "core*", "server*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

